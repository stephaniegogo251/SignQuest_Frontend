        <div id="camera-container"style="position: relative; display: inline-block;">

            <canvas ref="canvas" style="position: absolute; left: 0; top: 0; transform: scaleX(-1);"></canvas>
            
            <div v-if="predictionText" class="prediction-box">
                <h2>Detected: {{ predictionText }}</h2>
            </div>

            <p v-if="cameraError" style="color: red;">{{ cameraError }}</p>
            <br>
            <button @click="initCamera" :disabled="isModelLoading">Start Camera</button>
        </div>

            //this function is called as soon as the page loads
            created() {
                // this.getLessons(); //fetch lesson data
                this.loadMLModel();
                this.setupMediaPipe()
                    .then(() => {

                        this.loadMLModel();
                    })
                    .catch(err => {
                        this.cameraError = "Init Error: " + err.message;
                    });
            },
            //watches for change in search bar and filters lesson data accordingly
            watch: {
                searchQuery: {
                    handler: 'getLessons',
                    immediate: false
                }
            },
            methods: {
                loadMLModel() {
                    this.isModelLoading = true;
                    console.log("Loading model...");

                    // Replace with your actual backend URL where the model is hosted
                    const modelUrl = 'http://localhost:3000/static/models/model.json';

                    tf.loadLayersModel(modelUrl)
                        .then(loadedModel => {
                            this.model = loadedModel;
                            this.isModelLoading = false;
                            console.log("Model loaded successfully!");
                        })
                        .catch(err => {
                            this.isModelLoading = false;
                            this.cameraError = "Failed to load ML model: " + err.message;
                        });
                },
                setupMediaPipe() {
                    this.isModelLoading = true;
                    
                    // Check if the library loaded under 'tasksVision' or the global 'window'
                    const vision = window.tasksVision || tsvision; 

                    return vision.FilesetResolver.forVisionTasks(
                        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
                    )
                    .then(resolver => {
                        return vision.HandLandmarker.createFromOptions(resolver, {
                            baseOptions: {
                                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                                delegate: "GPU"
                            },
                            runningMode: "VIDEO",
                            numHands: 2
                        });
                    })
                    .then(landmarker => {
                        this.handLandmarker = landmarker;
                        this.isModelLoading = false;
                        console.log("Hand Landmarker Ready");
                    });
                },

                initCamera() {
                    this.cameraError = null;
                    
                    navigator.mediaDevices.getUserMedia({
                        video: { width: 640, height: 480 },
                        audio: false
                    })
                    .then(stream => {
                        this.stream = stream;
                        const video = this.$refs.webcam;
                        video.srcObject = stream;
                        
                        video.onloadedmetadata = () => {
                            video.play();
                            // Match canvas to video dimensions
                            this.$refs.canvas.width = video.videoWidth;
                            this.$refs.canvas.height = video.videoHeight;
                            this.canvasCtx = this.$refs.canvas.getContext("2d");
                            
                            this.startDetection(); 
                        };
                    })
                    .catch(err => {
                        this.cameraError = "Camera Error: " + err.message;
                    });
                },

                predict() {
                    const video = this.$refs.webcam;
                    const canvas = this.$refs.canvas;
                    const startTimeMs = performance.now();

                    // 1. Detect Landmarks (Synchronous call for video frames)
                    const results = this.handLandmarker.detectForVideo(video, startTimeMs);

                    // 2. Clear Canvas
                    this.canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    if (results.landmarks && results.landmarks.length > 0) {
                        results.landmarks.forEach(landmarks => {
                            // Draw Visuals (Landmarks and Connectors)
                            drawConnectors(this.canvasCtx, landmarks, HAND_CONNECTIONS, { color: "#00FF00", lineWidth: 5 });
                            drawLandmarks(this.canvasCtx, landmarks, { color: "#FF0000", lineWidth: 2 });

                            // 3. Prepare data for the TF.js model (flat array of 63: x,y,z for 21 points)
                            const inputData = landmarks.map(l => [l.x, l.y, l.z]).flat();
                            const tensor = tf.tensor2d([inputData]);

                            // 4. Promise-based prediction
                            this.model.predict(tensor).data()
                                .then(data => {
                                    const maxVal = Math.max(...data);
                                    const predictedIndex = data.indexOf(maxVal);

                                    if (maxVal > 0.85) {
                                        this.predictionText = this.labels[predictedIndex];
                                    } else {
                                        this.predictionText = "Scanning...";
                                    }
                                })
                                .finally(() => {
                                    // Cleanup memory after prediction
                                    tensor.dispose();
                                });
                        });
                    } else {
                        this.predictionText = "No hand detected";
                    }
                },

                startDetection() {
                    // Run a loop to detect signs every 500ms
                    setInterval(() => {
                        if (this.model && this.stream) {
                            this.predict();
                        }
                    }, 500);
                },
